<IfModule mod_ssl.c>
  <VirtualHost _default_:443>
    ServerName localhost
    ServerAdmin webmaster@localhost

    LogLevel debug ssl:debug
    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined

    <Directory /var/www/trove/>
        WSGIApplicationGroup %{GLOBAL}
        WSGIScriptReloading On
        Options FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>
    WSGIDaemonProcess trove python-path=/var/www/trove:/var/www/trove/venv/lib/python3.10/site-packages
    WSGIProcessGroup trove
    WSGIScriptAlias /trove /var/www/trove/trove_tom/wsgi.py

    Alias /trove/data /var/www/trove/data
    <Directory /var/www/trove/data/>
        Require all granted
    </Directory>

    SSLEngine on
    SSLCertificateFile /etc/ssl/certs/apache-selfsigned.crt
    SSLCertificateKeyFile /etc/ssl/private/apache-selfsigned.key

    <FilesMatch "\.(cgi|shtml|phtml|php)$">
      SSLOptions +StdEnvVars
    </FilesMatch>
    <Directory /usr/lib/cgi-bin>
      SSLOptions +StdEnvVars
    </Directory>

  </VirtualHost>
</IfModule>

