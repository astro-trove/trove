name: CI

on:
  push:
    branches: [main, staging, integration]
  pull_request:
    branches: [main, staging, integration]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-
            ${{ runner.os }}-pip-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libhdf5-dev

      - name: Create settings_local.py for CI
        run: |
          cat > trove_tom/settings_local.py << 'EOF'
          ALLOWED_HOST = 'localhost'
          ATLAS_API_KEY = ''
          DEBUG = True
          FORCE_SCRIPT_NAME = ''
          GCN_CLIENT_ID = ''
          GCN_CLIENT_SECRET = ''
          HOPSKOTCH_GROUP_ID = 'ci-test'
          LASAIR_TOKEN = ''
          POSTGRES_DB = ''
          POSTGRES_HOST = ''
          POSTGRES_PASSWORD = ''
          POSTGRES_PORT = 5432
          POSTGRES_USER = ''
          SAVE_TEST_ALERTS = False
          SCIMMA_AUTH_USERNAME = ''
          SCIMMA_AUTH_PASSWORD = ''
          SECRET_KEY = 'ci-test-secret-key-not-for-production'
          NLE_LINKS = []
          TARGET_LINKS = []
          SLACK_TOKENS_GW = []
          SLACK_TOKEN_EP = ''
          SLACK_TOKEN_TNS = ''
          TNS_API_KEY = ''
          TREASUREMAP_API_KEY = ''
          EOF

      - name: Install package and dependencies
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install -e ".[dev]"

      - name: Verify installation
        run: |
          python -c "import django; print(f'Django {django.VERSION}')"
          python -c "import trove_tom; print('trove_tom imported successfully')"
          python -c "import custom_code; print('custom_code imported successfully')"
          python -c "import candidate_vetting; print('candidate_vetting imported successfully')"

      - name: Run Django system checks
        env:
          POSTGRES_DB: ""
          SKIP_DUSTMAP: "1"
        run: |
          python manage.py check

      - name: Patch problematic upstream migrations
        run: |
          # Patch migrations with bugs that prevent CI from running on fresh SQLite DBs
          python << 'PATCH_SCRIPT'
          import os
          import site
          
          patches = [
              # tom_targets.0025 has missing dependencies on guardian/custom target app
              {
                  'path': ('tom_targets', 'migrations', '0025_auto_20250206_2017.py'),
                  'content': '''# Patched for CI - original migration has missing dependencies
          from django.db import migrations
          
          class Migration(migrations.Migration):
              dependencies = [
                  ('tom_targets', '0024_basetarget_permissions'),
              ]
              operations = []  # No-op for fresh databases
          '''
              },
              # tom_nonlocalizedevents.0016 has SQLite compatibility issue (None vs NULL)
              {
                  'path': ('tom_nonlocalizedevents', 'migrations', '0016_externalcoincidence_alter_eventsequence_options_and_more.py'),
                  'content': '''# Patched for CI - original migration has SQLite compatibility issues
          from django.db import migrations
          
          class Migration(migrations.Migration):
              dependencies = [
                  ('tom_nonlocalizedevents', '0015_eventsequence_and_more'),
              ]
              operations = []  # No-op for fresh databases
          '''
              },
              # tom_nonlocalizedevents.0017 depends on fields from 0016 which we skipped
              {
                  'path': ('tom_nonlocalizedevents', 'migrations', '0017_alter_eventsequence_external_coincidence_and_more.py'),
                  'content': '''# Patched for CI - depends on 0016 which was patched
          from django.db import migrations
          
          class Migration(migrations.Migration):
              dependencies = [
                  ('tom_nonlocalizedevents', '0016_externalcoincidence_alter_eventsequence_options_and_more'),
              ]
              operations = []  # No-op for fresh databases
          '''
              },
          ]
          
          for patch in patches:
              for sp in site.getsitepackages():
                  migration_path = os.path.join(sp, *patch['path'])
                  if os.path.exists(migration_path):
                      with open(migration_path, 'w') as f:
                          f.write(patch['content'])
                      print(f'Patched {migration_path}')
                      break
          PATCH_SCRIPT

      - name: Run database migrations
        env:
          POSTGRES_DB: ""
          SKIP_DUSTMAP: "1"
        run: |
          python manage.py migrate --run-syncdb

      - name: Collect static files
        env:
          POSTGRES_DB: ""
          SKIP_DUSTMAP: "1"
        run: |
          python manage.py collectstatic --noinput

      - name: Validate Django server can start
        env:
          POSTGRES_DB: ""
          SKIP_DUSTMAP: "1"
        run: |
          # Start the server in background
          python manage.py runserver 0.0.0.0:8000 &
          SERVER_PID=$!
          
          # Wait for server to be ready with retry loop
          MAX_ATTEMPTS=30
          ATTEMPT=0
          SERVER_READY=false
          
          echo "Waiting for Django server to start (PID: $SERVER_PID)..."
          
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))
            
            # Check if server process is still running
            if ! kill -0 $SERVER_PID 2>/dev/null; then
              echo "Server process died unexpectedly"
              exit 1
            fi
            
            # Try to connect
            if curl -sf http://localhost:8000/accounts/login/ -o /dev/null 2>/dev/null; then
              SERVER_READY=true
              echo "Server is ready after $ATTEMPT attempts"
              break
            fi
            
            echo "Attempt $ATTEMPT/$MAX_ATTEMPTS - waiting..."
            sleep 1
          done
          
          # Cleanup
          kill $SERVER_PID 2>/dev/null || true
          
          if [ "$SERVER_READY" = true ]; then
            echo "Django server validation PASSED"
          else
            echo "Django server failed to respond after $MAX_ATTEMPTS seconds"
            exit 1
          fi

      - name: Run test suite
        env:
          POSTGRES_DB: ""
          SKIP_DUSTMAP: "1"
        run: |
          pytest tests/ -v --tb=short

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linting tools
        run: |
          pip install ruff black

      - name: Run ruff check
        run: |
          ruff check . --exit-zero

      - name: Check black formatting
        run: |
          black --check --diff . || true
