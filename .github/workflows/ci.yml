name: CI

on:
  push:
    branches: [main, staging, integration]
  pull_request:
    branches: [main, staging, integration]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-
            ${{ runner.os }}-pip-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libhdf5-dev

      - name: Create settings_local.py for CI
        run: |
          cat > saguaro_tom/settings_local.py << 'EOF'
          ALLOWED_HOST = 'localhost'
          ATLAS_API_KEY = ''
          DEBUG = True
          FORCE_SCRIPT_NAME = ''
          GCN_CLIENT_ID = ''
          GCN_CLIENT_SECRET = ''
          HOPSKOTCH_GROUP_ID = 'ci-test'
          LASAIR_TOKEN = ''
          POSTGRES_DB = ''
          POSTGRES_HOST = ''
          POSTGRES_PASSWORD = ''
          POSTGRES_PORT = 5432
          POSTGRES_USER = ''
          SAVE_TEST_ALERTS = False
          SCIMMA_AUTH_USERNAME = ''
          SCIMMA_AUTH_PASSWORD = ''
          SECRET_KEY = 'ci-test-secret-key-not-for-production'
          NLE_LINKS = []
          TARGET_LINKS = []
          SLACK_TOKENS_GW = []
          SLACK_TOKEN_EP = ''
          SLACK_TOKEN_TNS = ''
          TNS_API_KEY = ''
          TREASUREMAP_API_KEY = ''
          EOF

      - name: Create dustmaps config
        run: |
          mkdir -p ~/dustmaps
          echo '{"data_dir": "'$HOME'/dustmaps"}' > ~/.dustmapsrc

      - name: Install package and dependencies
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install -e ".[dev]"

      - name: Verify installation
        run: |
          python -c "import django; print(f'Django {django.VERSION}')"
          python -c "import saguaro_tom; print('saguaro_tom imported successfully')"
          python -c "import custom_code; print('custom_code imported successfully')"
          python -c "import candidate_vetting; print('candidate_vetting imported successfully')"

      - name: Run Django system checks
        env:
          POSTGRES_DB: ""
        run: |
          python manage.py check

      - name: Patch problematic tom_targets migration
        run: |
          # The tom_targets.0025 migration has a bug - it doesn't declare dependencies
          # on guardian or the custom target app. Replace it with a no-op for fresh DBs.
          python << 'PATCH_SCRIPT'
          import os
          import site
          
          for sp in site.getsitepackages():
              migration_path = os.path.join(sp, 'tom_targets', 'migrations', '0025_auto_20250206_2017.py')
              if os.path.exists(migration_path):
                  patched_content = '''# Patched for CI - original migration has missing dependencies
          from django.db import migrations
          
          class Migration(migrations.Migration):
              dependencies = [
                  ('tom_targets', '0024_basetarget_permissions'),
              ]
              operations = []  # No-op for fresh databases
          '''
                  with open(migration_path, 'w') as f:
                      f.write(patched_content)
                  print(f'Patched {migration_path}')
                  break
          PATCH_SCRIPT

      - name: Run database migrations
        env:
          POSTGRES_DB: ""
        run: |
          python manage.py migrate --run-syncdb

      - name: Collect static files
        env:
          POSTGRES_DB: ""
        run: |
          python manage.py collectstatic --noinput

      - name: Validate Django server can start
        env:
          POSTGRES_DB: ""
        run: |
          timeout 10 python manage.py runserver 0.0.0.0:8000 &
          SERVER_PID=$!
          sleep 5
          
          # Check if server is responding
          curl -f http://localhost:8000/ || curl -f http://localhost:8000/accounts/login/ || true
          
          # Cleanup
          kill $SERVER_PID 2>/dev/null || true

      - name: Run test suite
        env:
          POSTGRES_DB: ""
        run: |
          pytest tests/ -v --tb=short

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linting tools
        run: |
          pip install ruff black

      - name: Run ruff check
        run: |
          ruff check . --exit-zero

      - name: Check black formatting
        run: |
          black --check --diff . || true
