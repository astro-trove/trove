{% extends 'tom_targets/partials/base.html' %}
{% load crispy_forms_tags comments bootstrap4 %}
{% load target_list_extras %}

{% block content %}
<style>
    /* 1. Background styling - Using your blurred image logic from before */
    body {
        background-color: white; 
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0;
        font-family: sans-serif;
    }

    /* 2. The Card */
    .update-redshift-card {
        /* White background, black text */
        background: white; 
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        
        /* Thin, bright border to define the card against the black BG */
        border: 1px solid rgba(255, 255, 255, 0.2); 
        border-radius: 12px;
        padding: 40px;
        width: 100%;
        max-width: 850px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        color: black; /* Pure white text for headers */
    }

    .update-redshift-card h2 {
        font-weight: 700;
        margin-bottom: 25px;
        text-align: center;
        color: black;
    }

    /* 3. Form Labels */
    .update-redshift-card label {
        color: black !important; 
        font-weight: 600;
        font-size: 0.95rem;
        margin-bottom: 8px;
        display: block;
    }

    /* 4. Inputs: Pure white background with black text and bright borders */
    .update-redshift-card input, 
    .update-redshift-card select, 
    .update-redshift-card textarea {
        background: white !important; 
        border: 2px solid #444 !important; /* Thicker, darker border */
        color: black !important; 
        border-radius: 8px !important;
        padding: 10px !important;
        width: 100%;
    }

    /* Highlight inputs when clicked */
    .update-redshift-card input:focus, 
    .update-redshift-card select:focus {
        border-color: #e91e63 !important; /* Pink glow on focus */
        outline: none;
    }

    /* 5. The "Submit" Button: Vivid Pink */
    .btn-redshift {
        background: pink !important; 
        color: black !important;
        border: none;
        padding: 14px;
        border-radius: 8px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 1px;
        transition: all 0.2s ease-in-out;
        margin-top: 20px;
        width: 100%;
    }

    .btn-redshift:hover {
        background: #ff4081 !important;
        transform: scale(1.02);
        box-shadow: 0 0 20px rgba(233, 30, 99, 0.5);
    }

    /* Cancel Link */
    .cancel-link {
        display: block;
        text-align: center;
        margin-top: 20px;
        color: #aaa;
        text-decoration: none;
        font-size: 0.85rem;
    }
    .cancel-link:hover {
        color: #fff;
    }
</style>

<div class="container d-flex justify-content-center">

    <div class="update-redshift-card">
        <h2>Update a Potential Host Galaxy Redshift</h2>
        <div class="col-md-8">
          <details>
            <summary><h4 style="display:inline-block">Host Galaxies</h4></summary>
            {% galaxy_table form.target %}
          </details>
        </div>
        <br>
        <div class="d-grid">
            <form action="" method="post">  
                {% csrf_token %}  
                {{ form }}
                <button type="submit" class="btn btn-primary btn-redshift">
                    Update Selected Galaxy Redshift
                </button>
                <a href="{{ request.META.HTTP_REFERER }}" class="text-center mt-3 text-black-50 text-decoration-none small">
                    Cancel and Return
                </a>       
            </form>
        </div>
    </div>
</div>
{% endblock %}
